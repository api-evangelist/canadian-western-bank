actions:
  apisYmlUpdated: true
  openapiHarvested: false
  reason: |
    No first-party public API or downloadable specification exists to harvest.
    The cwbank.com domain now redirects entirely to National Bank of Canada
    following the acquisition. The record is identity-only with an honest
    aggregator-only open-finance posture; apis[] is intentionally empty rather
    than padded with fabricated entries.
