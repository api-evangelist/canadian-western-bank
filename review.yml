      status: 000
      note: Host does not resolve (getaddrinfo ENOTFOUND / no connection).
    - url: https://developers.cwbank.com
      status: 000
      note: Host does not resolve / no connection.
    - url: https://api.cwbank.com
      status: 000
      note: Host does not resolve / no connection.
    - url: https://apis.cwbank.com
      status: 000
      note: Host does not resolve / no connection.
    - url: https://www.cwbank.com/
      status: 301
      note: Redirects to https://nbc.ca/en/business.html (National Bank of Canada) — whole domain now redirects post-acquisition.
    - url: https://www.cwbank.com/developers
      status: 200
      note: HTTP 200 only because the domain redirects to the National Bank business page; not a genuine developer page.
    - url: https://www.cwbank.com/api
      status: 200
      note: HTTP 200 only because the domain redirects to the National Bank business page; not a genuine API page.
