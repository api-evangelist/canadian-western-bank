aid: canadian-western-bank
name: Canadian Western Bank
review:
  question: Does Canadian Western Bank expose a first-party public developer API, developer portal, or a documented open-finance / Consumer-Driven Banking data-access API?
  answer: false
  date: '2026-07-23'
  reviewer: API Evangelist
findings:
  summary: |
    Canadian Western Bank (CWB) publishes no first-party public developer portal
    and no documented public API. Probes of the conventional developer and API
    hosts (developer.cwbank.com, developers.cwbank.com, api.cwbank.com,
    apis.cwbank.com) do not resolve (connection code 000). The public cwbank.com
    domain itself now 301-redirects to National Bank of Canada (nbc.ca) — a
    direct consequence of National Bank's acquisition of CWB (announced June 11,
    2024; closed early 2025), after which CWB operates as a subsidiary and its
    brand is being wound down. Because every path under cwbank.com resolves to
    the National Bank business landing page, requests such as /developers and
    /api return HTTP 200 only as the redirect target, not as genuine developer
    resources; no API reference, SDK, sandbox, or downloadable OpenAPI/Swagger
    exists.

    This posture is consistent with Canada's voluntary, still-fragmented
    open-finance landscape. The federal Consumer-Driven Banking (CDB) framework
    was legislated in 2024 (Budget 2024 / Fall Economic Statement 2024, with the
    Financial Consumer Agency of Canada / FCAC as overseer) but is NOT yet
    operational, so there is no mandated open-banking API contract in force.
    Consumer-permissioned account and transaction data for CWB is reached only
    INDIRECTLY through third-party data aggregators: Plaid is confirmed via
    external aggregator coverage directories (OpenBankingTracker lists CWB as
    supported by aggregator connectivity with no first-party API products).
    As a National Bank of Canada subsidiary, CWB also sits within an ecosystem in
    which the Canadian aggregator Flinks (National Bank-owned) is prominent,
    though no first-party CWB Flinks integration is separately documented.

    No first-party FDX-conformant data-access endpoint, no published CDB
    data endpoint, and no Interac or Real-Time Rail (Payments Canada) developer
    API were found on CWB's own properties. Because there is no documented
    first-party surface, no authentication model (OAuth2/OIDC, API-key, or mTLS)
    could be confirmed, and no specification could be harvested. This is an
    honest identity-only, aggregator-only record for an institution now absorbed
    into National Bank of Canada.
