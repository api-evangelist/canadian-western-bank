name: Canadian Western Bank
kind: company
description: >-
  Canadian Western Bank (CWB) is a Schedule I domestic chartered bank founded in
  1988 (through the merger of the Bank of Alberta and Western & Pacific Bank) and
  headquartered in Edmonton, Alberta at Canadian Western Bank Place. Historically
  the largest publicly traded Schedule I bank headquartered in Western Canada and
  listed on the Toronto Stock Exchange (TSX: CWB), it held roughly CA$43 billion
  in assets and focused on full-service business and commercial banking, personal
  banking, equipment financing and leasing, trust services, and wealth management
  across a network of affiliated entities. In June 2024 National Bank of Canada
  agreed to acquire CWB in an all-share deal valued at roughly CA$5 billion, and
  the acquisition closed in early 2025; CWB now operates as a subsidiary of
  National Bank of Canada and its branches and brand are being wound down and
  rebranded under National Bank. Consistent with Canada's voluntary and still
  fragmented open-finance landscape — the federal Consumer-Driven Banking
  framework was legislated in 2024 (Budget 2024 / Fall Economic Statement,
  overseen by the FCAC) but is not yet operational — CWB publishes no first-party
  public developer portal and no documented public API. Its developer and API
  hostnames do not resolve, and the entire cwbank.com domain now 301-redirects to
  National Bank of Canada (nbc.ca). Consumer-permissioned account and transaction
  data is reached only indirectly through third-party data aggregators (Plaid is
  confirmed via aggregator coverage directories). No first-party FDX-conformant
  data-access API was found. This is an honest identity-only, aggregator-only
  record for an institution now absorbed into National Bank of Canada.
